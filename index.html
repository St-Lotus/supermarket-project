<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ST.LOTUS SUPERMARKET Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .product-card { transition: transform 0.2s; border: none !important; border-radius: 12px; overflow: hidden; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    .vendor-sidebar { position: sticky; top: 80px; }
    .product-img { height: 200px; object-fit: cover; background-color: #f8f9fa; }
    .list-group-item.active { background-color: #0d6efd !important; border-color: #0d6efd !important; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <strong>ST.LOTUS SUPERMARKET</strong>
      </a>
    </div>
  </nav>

  <div class="container-fluid px-4 mt-4">
    <div class="row">
      <div class="col-md-3 mb-4">
        <div class="vendor-sidebar">
          <h5 class="mb-3 fw-bold">Main Vendors</h5>
          <div class="list-group shadow-sm" id="vendorList">
            <a href="#" class="list-group-item list-group-item-action active">အားလုံး</a>
            <a href="#" class="list-group-item list-group-item-action">Ar Li Gon</a>
            <a href="#" class="list-group-item list-group-item-action">A May Latt Yar</a>
            <a href="#" class="list-group-item list-group-item-action">Asia Golden Sea Co.,Ltd.TGI</a>
            <a href="#" class="list-group-item list-group-item-action">CGM</a>
            <a href="#" class="list-group-item list-group-item-action">Centig Food Distribution(Goody) Co.,Ltd</a>
          </div>
        </div>
      </div>

      <div class="col-md-9">
        <div class="input-group mb-4 shadow-sm border-0">
          <span class="input-group-text bg-white border-end-0">🔍</span>
          <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="ပစ္စည်းအမည် သို့မဟုတ် မြန်မာအမည်ဖြင့် ရှာဖွေရန်...">
        </div>
        
        <div class="row" id="productGrid">
          </div>
      </div>
    </div>
  </div>

  <script>
    let allProducts = []; 
    let activeVendor = 'အားလုံး';

    // ၁။ Database မှ Data ဆွဲယူခြင်း
    async function loadProducts() {
      try {
        const response = await fetch('https://supermarket-project-17xz.onrender.com/api/products');
        allProducts = await response.json();
        renderProducts(allProducts);
      } catch (error) {
        console.error("Error loading data:", error);
        document.getElementById('productGrid').innerHTML = '<p class="text-danger text-center">Server ချိတ်ဆက်မှု မအောင်မြင်ပါ။</p>';
      }
    }

    // ၂။ ပစ္စည်းများကို Website ပေါ်တွင် ပြသခြင်း
    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      
      if (products.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center mt-5 text-muted"><h5>ရှာဖွေနေသော ပစ္စည်းမရှိပါ။</h5></div>';
        return;
      }

      products.forEach(p => {
        grid.innerHTML += `
          <div class="col-md-4 col-lg-3 mb-4">
            <div class="card h-100 shadow-sm product-card">
              <img src="${p.image_url}" class="card-img-top product-img" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
              <div class="card-body">
                <h6 class="text-primary small fw-bold">${p.category || 'General'}</h6>
                <h5 class="card-title h6 fw-bold">${p.name_en}</h5>
                <p class="card-text text-muted small mb-3">${p.name_mm}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="fw-bold text-muted small">Stock: ${p.price}</span>
                  <span class="badge bg-light text-dark border fw-normal small">${p.vendor || 'Unknown'}</span>
                </div>
              </div>
            </div>
          </div>`;
      });
    }

    // ၃။ Search နှင့် Vendor ကို ပေါင်းပြီး စစ်ထုတ်ခြင်း
    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = allProducts.filter(p => {
        const nameEN = (p.name_en || "").toLowerCase();
        const nameMM = (p.name_mm || "");
        const productVendor = (p.vendor || "").trim();

        const matchesSearch = nameEN.includes(searchTerm) || nameMM.includes(searchTerm);
        // Vendor Logic
        const matchesVendor = (activeVendor === 'အားလုံး') || (productVendor === activeVendor);
        
        return matchesSearch && matchesVendor;
      });

      renderProducts(filtered);
    }

    // ၄။ Events များကို ချိတ်ဆက်ခြင်း
    // Search input အတွက်
    document.getElementById('searchInput').addEventListener('input', applyFilters);

    // Sidebar Vendor list နှိပ်သည့်အတွက်
    document.querySelectorAll('.list-group-item').forEach(item => {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        
        // အရောင်ပြောင်းရန်
        document.querySelectorAll('.list-group-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        
        // နှိပ်လိုက်သော Vendor နာမည်ကို သိမ်းရန်
        activeVendor = this.innerText.trim();
        console.log("Filtering by:", activeVendor); // Debugging အတွက်
        
        applyFilters();
      });
    });

    // Start loading
    loadProducts();
  </script>
</body>
</html>
