<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ST.LOTUS SUPERMARKET Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .product-card { transition: transform 0.2s; }
    .product-card:hover { transform: scale(1.02); }
    .vendor-sidebar { position: sticky; top: 80px; }
    .product-img { height: 200px; object-fit: cover; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <strong>ST.LOTUS SUPERMARKET</strong>
      </a>
    </div>
  </nav>

  <div class="container-fluid px-4 mt-4">
    <div class="row">
      <div class="col-md-3 mb-4">
        <div class="vendor-sidebar">
          <h5 class="mb-3">Main Vendors</h5>
          <div class="list-group shadow-sm">
            <button class="list-group-item list-group-item-action active" onclick="filterVendor('all')">အားလုံး</button>
            <button class="list-group-item list-group-item-action" onclick="filterVendor('Ar Li Gon')">Ar Li Gon</button>
            <button class="list-group-item list-group-item-action" onclick="filterVendor('A May Latt Yar')">A May Latt Yar</button>
            </div>
        </div>
      </div>

      <div class="col-md-9">
        <div class="input-group mb-4 shadow-sm">
          <span class="input-group-text bg-white">🔍</span>
          <input type="text" id="searchInput" class="form-control" placeholder="ရှာဖွေရန်..." onkeyup="searchProduct()">
        </div>
        <div class="row" id="productGrid">
            </div>
      </div>
    </div>
  </div>

  <script>
    // ရှာဖွေသည့် Function
    function searchProduct() {
      let input = document.getElementById('searchInput').value.toLowerCase();
      let items = document.getElementsByClassName('product-item');
      for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(input) ? "" : "none";
      }
    }

    // Vendor အလိုက်စစ်ထုတ်သည့် Function
    function filterVendor(vendorName) {
      let items = document.querySelectorAll('.product-item');
      items.forEach(item => {
        let itemVendor = item.getAttribute('data-vendor');
        item.style.display = (vendorName === 'all' || itemVendor === vendorName) ? "block" : "none";
      });
    }

    // Backend (Render) မှ Data ဆွဲယူသည့် Function
async function loadProducts() {
    try {
        // API URL ကို မျက်တောင်ဖွင့်ပိတ် ' ' ထဲမှာ သေချာထည့်ပါ
        const response = await fetch('https://supermarket-project-17xz.onrender.com/api/products');
        const products = await response.json(); // JSON data အဖြစ် ပြောင်းယူခြင်း

        const grid = document.getElementById('productGrid');
        grid.innerHTML = ''; // အဟောင်းတွေကို ရှင်းထုတ်ခြင်း

        if (!products || products.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center"><h5>Database ထဲမှာ ပစ္စည်းမရှိသေးပါ...</h5></div>';
            return;
        }

        // Loop ပတ်ပြီး Card လေးတွေ ထုတ်ပေးခြင်း
        products.forEach(p => {
            const card = `
                <div class="col-md-3 mb-4">
                    <div class="card h-100 shadow-sm border-0 product-card">
                        <img src="${p.image_url}" class="card-img-top product-img" 
                             alt="${p.name_en}" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="card-body">
                            <h6 class="text-primary small">${p.category || 'General'}</h6>
                            <h5 class="card-title">${p.name_en}</h5>
                            <p class="card-text text-muted small">${p.name_mm}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold">${p.price} MMK</span>
                                <span class="badge bg-light text-dark border">${p.vendor || 'Unknown'}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            grid.innerHTML += card;
        });
    } catch (error) {
        console.error("Error loading products:", error);
    }
}

    // Page စဖွင့်တာနဲ့ Data ခေါ်ခိုင်းခြင်း
    loadProducts();
  </script>
</body>
</html>
